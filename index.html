<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super ESL World - Grade 5</title>
    <style>
        :root { --sky: #5c94fc; --m-red: #e74c3c; --m-gold: #f1c40f; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* Welcoming Screen - Mario Theme */
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; }
        #scr-start { background: var(--sky); border: 10px solid #904800; }
        .title-banner { background: var(--m-red); padding: 20px; border: 5px solid white; box-shadow: 10px 10px 0 #000; margin-bottom: 20px; }
        
        /* Real Game Arena */
        #stage { width: 100%; max-width: 600px; height: 260px; background: var(--sky); position: relative; border: 4px solid white; overflow: hidden; margin-top: 10px; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 40px; background: #904800; border-top: 4px solid #2ecc71; }
        
        /* Mario & Objects */
        #mario { font-size: 3rem; position: absolute; bottom: 40px; left: 50px; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 10; }
        #block { width: 50px; height: 50px; background: #ff9b13; border: 3px solid #000; position: absolute; top: 60px; left: 250px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; border-radius: 4px; }
        .coin-pop { position: absolute; font-size: 2rem; left: 260px; top: 60px; display: none; animation: pop 0.5s ease-out; }
        
        @keyframes pop { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-100px); opacity:0; } }
        
        /* Character States */
        .mario-big { transform: scale(1.6); filter: drop-shadow(0 0 5px yellow); }
        .mario-fire { transform: scale(1.6); filter: drop-shadow(0 0 15px red); }

        /* Grade 5 ESL Quiz Box */
        .quiz-ui { width: 100%; max-width: 600px; background: white; color: black; padding: 15px; border-radius: 0 0 20px 20px; border: 6px solid #000; box-sizing: border-box; }
        .opt { width: 100%; padding: 12px; margin: 5px 0; border: 3px solid #000; border-radius: 10px; background: #2ecc71; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        .nav-btn { position: absolute; top: 10px; right: 10px; padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- WELCOME PAGE -->
    <div id="scr-start" class="screen active">
        <div class="title-banner"><h1>SUPER ESL BROS.</h1></div>
        <div style="background:rgba(0,0,0,0.5); padding:15px; border-radius:10px; margin-bottom:20px; font-size:0.8rem;">
            <p>1. Answer the Grade 5 ESL Question.</p>
            <p>2. Correct Answer = Mario Jumps & Hits Block.</p>
            <p>3. 5 COINS = MUSHROOM POWER (GROW BIG!)</p>
            <p>4. 10 COINS = FIRE POWER!</p>
        </div>
        <button class="opt" style="width:250px; background:var(--m-red)" onclick="init()">START GAME</button>
    </div>

    <!-- GAMEPLAY PAGE -->
    <div id="scr-game" class="screen">
        <button class="nav-btn" style="right:110px; background:#7f8c8d; color:white;" onclick="init()">RESET</button>
        <button class="nav-btn" style="background:var(--m-red); color:white;" onclick="location.reload()">TERMINATE</button>

        <div style="font-size:1.2rem; color:gold; margin-bottom:10px;">COINS: <span id="c-count">0</span> | LIVES: <span id="l-count">3</span></div>
        
        <div id="stage">
            <div id="mario">🏃</div>
            <div id="block">?</div>
            <div id="coin" class="coin-pop">💰</div>
            <div class="ground"></div>
        </div>

        <div class="quiz-ui">
            <p id="q-txt" style="font-weight:bold; margin-bottom:10px;"></p>
            <div id="opt-wrap"></div>
        </div>
    </div>

    <script>
        // GRADE 5 ESL TOPICS: Grammar, Vocabulary, Tenses, Punctuation
        const grade5Qs = [
            {q:"Which word is an Adverb?", a:["Quickly","Green","Apple","Jump"], c:0},
            {q:"Choose the correct past tense: 'He ____ to school yesterday.'", a:["walked","walk","walking","walks"], c:0},
            {q:"Find the Synonym for 'Angry':", a:["Furious","Happy","Tired","Calm"], c:0},
            {q:"Which sentence uses a proper noun?", a:["I visited London.","I like the city.","He is a boy.","We played a game."], c:0},
            {q:"Choose the correct plural: 'The ____ are playing.'", a:["children","childs","childrens","childes"], c:0},
            {q:"Which is a COMPOUND word?", a:["Raincoat","Running","Beautiful","Apple"], c:0},
            {q:"Identify the Subject: 'The big dog barked.'", a:["The big dog","Barked","Dog","Big"], c:0},
            {q:"Opposite of 'Difficult':", a:["Easy","Hard","Soft","Large"], c:0},
            {q:"Which word needs a Capital Letter?", a:["vietnam","apple","running","table"], c:0},
            {q:"Choose the correct article: 'I saw ___ elephant.'", a:["an","a","the","some"], c:0}
        ];

        let coins=0, lives=3, isJumping=false;

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function init() {
            coins=0; lives=3;
            document.getElementById('mario').className = '';
            document.getElementById('mario').innerText = '🏃';
            updateUI();
            show('scr-game');
            ask();
        }

        function ask() {
            if(lives <= 0) { alert("Game Over! Try again."); init(); return; }
            const qObj = grade5Qs[Math.floor(Math.random()*grade5Qs.length)];
            document.getElementById('q-txt').innerText = qObj.q;
            const wrap = document.getElementById('opt-wrap');
            wrap.innerHTML = '';

            let choices = qObj.a.map((t, i) => ({ t, correct: i === qObj.c }));
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt';
                b.innerText = o.t;
                b.onclick = () => {
                    if(o.correct) {
                        jump();
                        coins++;
                        if(coins === 5) { alert("MUSHROOM! Mario Grew!"); document.getElementById('mario').classList.add('mario-big'); }
                        if(coins === 10) { alert("FIRE FLOWER!"); document.getElementById('mario').classList.add('mario-fire'); document.getElementById('mario').innerText = '🔥'; }
                    } else {
                        lives--;
                        document.body.style.backgroundColor = "red";
                        setTimeout(() => document.body.style.backgroundColor = "black", 200);
                    }
                    updateUI();
                    setTimeout(ask, 600);
                };
                wrap.appendChild(b);
            });
        }

        function jump() {
            if(isJumping) return;
            isJumping = true;
            const m = document.getElementById('mario');
            const c = document.getElementById('coin');
            m.style.bottom = "120px";
            setTimeout(() => { 
                c.style.display = "block"; 
                setTimeout(() => c.style.display = "none", 500);
            }, 100);
            setTimeout(() => { m.style.bottom = "40px"; isJumping = false; }, 300);
        }

        function updateUI() {
            document.getElementById('c-count').innerText = coins;
            document.getElementById('l-count').innerText = lives;
        }
    </script>
</body>
</html>
