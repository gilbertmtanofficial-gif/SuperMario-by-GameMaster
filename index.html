<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super ESL World</title>
    <style>
        :root { --m-blue: #5c94fc; --m-red: #e74c3c; --m-gold: #f1c40f; --m-green: #2ecc71; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex !important; }

        /* Welcome Screen */
        #scr-start { background: var(--m-blue); border: 10px solid #000; }
        .mario-title { font-size: 2.5rem; color: var(--m-red); text-shadow: 4px 4px #000; background: white; padding: 10px 20px; border: 5px solid #000; }
        .instructions { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; font-size: 0.9rem; margin: 20px 0; line-height: 1.4; }

        /* Arena */
        #world { width: 100%; max-width: 500px; height: 200px; background: linear-gradient(to bottom, #5c94fc 70%, #904800 70%); border: 5px solid white; position: relative; overflow: hidden; border-radius: 15px; }
        #mario { font-size: 3rem; position: absolute; bottom: 40px; left: 40px; transition: 0.2s; z-index: 5; }
        #q-block { width: 50px; height: 50px; background: #ff9b13; border: 3px solid #000; position: absolute; top: 40px; left: 220px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; font-weight: bold; border-radius: 5px; }
        
        /* Growth States */
        .big { transform: scale(1.6); }
        .fire { transform: scale(1.6); filter: drop-shadow(0 0 10px red); }

        /* Quiz UI */
        .quiz-container { width: 100%; max-width: 500px; background: white; color: black; padding: 15px; border-radius: 15px; border: 5px solid var(--m-red); margin-top: 10px; }
        .opt { width: 100%; padding: 12px; margin: 5px 0; border: 3px solid #000; border-radius: 8px; background: var(--m-green); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }

        /* Controls */
        .top-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 1rem; color: gold; z-index: 100; }
        .game-buttons { position: absolute; bottom: 10px; display: flex; gap: 10px; }
        .mini-btn { padding: 5px 15px; background: #7f8c8d; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SCREEN 1: WELCOME -->
    <div id="scr-start" class="screen active">
        <div class="mario-title">SUPER ESL BROS</div>
        <div class="instructions">
            <p>1. Answer correctly to JUMP.</p>
            <p>2. Hit the block to get COINS.</p>
            <p>3. 5 COINS = 🍄 MUSHROOM (BIG!)</p>
            <p>4. 10 COINS = 🔥 FIRE FLOWER!</p>
        </div>
        <button class="opt" style="background:var(--m-red); width: 200px;" onclick="startGame()">START GAME</button>
    </div>

    <!-- SCREEN 2: GAMEPLAY -->
    <div id="scr-game" class="screen">
        <div class="top-ui">
            <span>COINS: <span id="coin-val">0</span></span>
            <span>LIVES: <span id="life-val">3</span></span>
        </div>

        <div id="world">
            <div id="mario">🏃</div>
            <div id="q-block">?</div>
        </div>

        <div class="quiz-container">
            <p id="q-text" style="font-weight:bold;"></p>
            <div id="opt-box"></div>
        </div>

        <div class="game-buttons">
            <button class="mini-btn" onclick="resetGame()">RESET</button>
            <button class="mini-btn" style="background:var(--m-red)" onclick="location.reload()">TERMINATE</button>
        </div>
    </div>
